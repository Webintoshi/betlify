version: "3.8"

services:
  frontend:
    build:
      context: ./betting-analyzer/frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_BACKEND_URL=/api/backend
      - BACKEND_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./betting-analyzer/backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - THE_ODDS_API_KEY=${THE_ODDS_API_KEY}
      - ODDS_API_IO_KEY=${ODDS_API_IO_KEY}
      - ODDS_API_BOOKMAKER=${ODDS_API_BOOKMAKER}
      - ODDS_API_MAX_REQ_PER_HOUR=${ODDS_API_MAX_REQ_PER_HOUR}
      - ODDS_API_MIN_DEPTH=${ODDS_API_MIN_DEPTH}
      - ODDS_API_MAX_SPREAD_PCT=${ODDS_API_MAX_SPREAD_PCT}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
