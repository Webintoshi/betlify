name: betlify-backend

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-betlify}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - betlify_pg_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-betlify}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgrest:
    image: postgrest/postgrest:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGRST_DB_URI=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-betlify}
      - PGRST_DB_SCHEMAS=public
      - PGRST_DB_ANON_ROLE=${POSTGREST_DB_ANON_ROLE:-postgres}
      - PGRST_JWT_SECRET=${POSTGREST_JWT_SECRET:-local_jwt_secret_for_betlify_2026_32bytes}
      - PGRST_SERVER_PORT=3000
    ports:
      - "${POSTGREST_PORT:-13000}:3000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - LOCAL_DB_MODE=true
      - LOCAL_POSTGREST_URL=http://postgrest:3000
      - LOCAL_SUPABASE_SERVICE_KEY=${LOCAL_SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoicG9zdGdyZXMiLCJpc3MiOiJsb2NhbCIsImV4cCI6MjUyNDYwODAwMH0.woUq00a-CcuZAobw52mSghms9lcuPQRYOK783cyO-DY}
      - SUPABASE_URL=http://postgrest:3000
      - SUPABASE_SERVICE_KEY=${LOCAL_SUPABASE_SERVICE_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoicG9zdGdyZXMiLCJpc3MiOiJsb2NhbCIsImV4cCI6MjUyNDYwODAwMH0.woUq00a-CcuZAobw52mSghms9lcuPQRYOK783cyO-DY}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY}
      - THE_ODDS_API_KEY=${THE_ODDS_API_KEY}
      - ODDS_API_IO_KEY=${ODDS_API_IO_KEY}
      - ODDS_API_BOOKMAKER=${ODDS_API_BOOKMAKER}
      - ODDS_API_MAX_REQ_PER_HOUR=${ODDS_API_MAX_REQ_PER_HOUR}
      - ODDS_API_MIN_DEPTH=${ODDS_API_MIN_DEPTH}
      - ODDS_API_MAX_SPREAD_PCT=${ODDS_API_MAX_SPREAD_PCT}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    depends_on:
      postgrest:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
        ]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  betlify_pg_data:
